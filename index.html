<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Для тебя ❤️</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #ffdde1;
            background: linear-gradient(135deg, #ff9a9e, #fecfef);
            font-family: Arial, sans-serif;
            text-align: center;
        }

        .box {
            background: rgba(255, 255, 255, 0.3);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(255, 100, 150, 0.3);
        }

        h1 {
            font-size: 40px;
            color: #b30059;
            margin-bottom: 20px;
        }

        button {
            padding: 15px 30px;
            background: #ff4d79;
            border: none;
            border-radius: 15px;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }

            button:hover {
                background: #ff1a66;
            }

        #msg {
            margin-top: 20px;
            font-size: 26px;
            color: #b30059;
            opacity: 0;
            transition: 1s;
        }
    </style>
</head>

<body>

    <div class="box">
        <h1>Для тебя ❤️</h1>
        <button id="loveBtn">Нажми</button>
        <p id="msg">Я люблю тебя 💖</p>
    </div>

    <script>
        const btn = document.getElementById("loveBtn");
        const msg = document.getElementById("msg");

        btn.onclick = function() {
        msg.style.opacity = "1";
        btn.style.display = "none";
        };
    </script>

</body>
</html>
